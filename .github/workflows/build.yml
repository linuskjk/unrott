name: Build Unrott
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force iOS 17 Deployment Target
        run: |
          find . -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 17.0;/g' {} +

      - name: Build App
        run: |
          xcodebuild -project "Unrott/Unrott.xcodeproj" \
          -scheme Unrott \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          clean build

      - name: Add Camera Permission
        run: |
          # Fügt den benötigten Text in die bereits gebaute App ein, damit sie nicht abstürzt
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Unrott benötigt die Kamera, um deine Liegestütze zu zählen.'" build/Build/Products/Release-iphoneos/Unrott.app/Info.plist

      - name: Prepare Payload
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/Unrott.app Payload/
          zip -r Unrott.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unrott-IPA
          path: Unrott.ipa
