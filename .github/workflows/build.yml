name: Build Unrott
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force iOS 17 Deployment Target
        run: |
          find . -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 17.0;/g' {} +

      - name: Build App
        run: |
          xcodebuild -project "Unrott/Unrott.xcodeproj" \
          -scheme Unrott \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          clean build

      - name: Inject Permissions (Camera & ScreenTime)
        run: |
          PLIST="build/Build/Products/Release-iphoneos/Unrott.app/Info.plist"
          
          # Bestehende Keys löschen, falls vorhanden, um Fehler zu vermeiden, dann neu hinzufügen
          /usr/libexec/PlistBuddy -c "Delete :NSCameraUsageDescription" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Unrott benötigt die Kamera, um deine Liegestütze zu zählen.'" "$PLIST"
          
          /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.family-controls" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.family-controls boolean true" "$PLIST"
          
          /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.parental-controls" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.parental-controls boolean true" "$PLIST"
          
          echo "Berechtigungen erfolgreich injiziert."

      - name: Prepare Payload
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/Unrott.app Payload/
          zip -r Unrott.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unrott-IPA
          path: Unrott.ipa
